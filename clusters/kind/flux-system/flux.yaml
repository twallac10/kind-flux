apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 1m
  url: https://charts.fluxcd.io
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 1m
  releaseName: flux-system
  chart:
    spec:
      chart: fluxcd-community/flux2
      version: 2.15.0
      sourceRef:
        kind: HelmRepository
        name: flux-system
        namespace: flux-system
  values:
    multitenancy:
      enabled: true
    imageAutomationController:
      create: false
    imageReflectionController:
      create: false
  install:
    createNamespace: true