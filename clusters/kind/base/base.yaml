apiVersion: v1
kind: Namespace
metadata:
  name: kuma-system
  labels:
    kuma.io/mesh: demo
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app
  namespace: httpbin
spec:
  interval: 1m0s
  path: ./app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system