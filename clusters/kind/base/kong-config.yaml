apiVersion: v1
kind: Namespace
metadata:
  name: httpbin
  labels:
    kuma.io/sidecar-injection: enabled
  annotations:
    kuma.io/mesh: demo
---
apiVersion: kuma.io/v1alpha1
kind: Mesh
metadata:
  name: demo
spec:
  mtls:
    backends:
      - conf: 
          caCert:
            RSAbits: 2048
            expiration: 10y
          dpCert:
            rotation:
              expiration: 1d
          name: ca-1
          type: builtin
    enabledBackend: ca-1
  networking:
    outbound:
      passthrough: false
  routing:
    localityAwareLoadBalancing: true
    zoneEgress: true
  skipCreatingInitialPolicies:
   - '*'