apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kyverno
  namespace: policy
spec:
  interval: 1m0s
  url: https://kyverno.github.io/kyverno/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: policy
spec:
  interval: 1m0s
  timeout: 2m
  chart:
    spec:
      chart: kyverno
      version: 3.4.1
      sourceRef:
        kind: HelmRepository
        name: kyverno
  releaseName: kyverno
  targetNamespace: policy
  values: {}
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: policy
spec:
  interval: 1m0s
  timeout: 2m
  chart:
    spec:
      chart: kyverno-policies
      version: 3.4.1
      sourceRef:
        kind: HelmRepository
        name: kyverno
  releaseName: kyverno
  targetNamespace: policy
  values: {}