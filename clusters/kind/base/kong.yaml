apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kong-mesh
  namespace: kong-system
spec:
  interval: 1m0s
  url: https://kong.github.io/kong-mesh-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: kong-mesh
  namespace: kong-system
spec:
  interval: 1m0s
  chart:
    spec:
      chart: kong-mesh
      version: 2.10.0
      sourceRef:
        kind: HelmRepository
        name: kong-mesh
  releaseName: kong-mesh
  targetNamespace: kong-system
  values:
    kuma:
      ingress:
        enabled: true
      egress:
        enabled: true