apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kuma
  namespace: kuma-system
spec:
  interval: 1m0s
  url: https://kumahq.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kuma-mesh
  namespace: kuma-system
spec:
  interval: 1m0s
  chart:
    spec:
      chart: kuma
      version: 2.10.1
      sourceRef:
        kind: HelmRepository
        name: kuma
  releaseName: kuma-mesh
  targetNamespace: kuma-system
  values:
    controlPlane:
      envVars:
        KUMA_RUNTIME_KUBERNETES_INJECTOR_CONTAINER_PATCHES: "patch1"
    ingress:
      enabled: true
    egress:
      enabled: true
---
apiVersion: kuma.io/v1alpha1
kind: ContainerPatch
metadata:
  name: container-patch-1
  namespace: kuma-system
spec:
  initPatch:
    - op: add
      path: /securityContext/runAsNonRoot
      value: true