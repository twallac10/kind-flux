apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongosh
  namespace: httpbin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongosh
  template:
    metadata:
      labels:
        app: mongosh
    spec:
      containers:
      - name: mongosh
        image: alpine/mongosh:2.0.2
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh"]
        args: 
        - "-c"
        - |
          echo "=== MongoDB Atlas Connection Diagnostics ==="
          echo "Pod IP: $(hostname -i)"
          
          # Install required tools if missing
          if ! command -v nc >/dev/null 2>&1; then
            echo "Installing netcat..."
            apk add --no-cache netcat-openbsd >/dev/null 2>&1 || echo "Failed to install netcat"
          fi
          
          echo "Testing DNS resolution..."
          echo "A record lookup:"
          nslookup testcluster.yzcupsf.mongodb.net || echo "A record DNS resolution failed"
          
          echo "SRV record lookup (required for mongodb+srv://):"
          SRV_RESULT=$(nslookup -type=SRV _mongodb._tcp.testcluster.yzcupsf.mongodb.net 2>/dev/null)
          
          if echo "$SRV_RESULT" | grep -q "service ="; then
            echo "$SRV_RESULT"
            echo "Extracting MongoDB endpoints from SRV records..."
            
            # More robust parsing - handle different nslookup formats
            ENDPOINTS=$(echo "$SRV_RESULT" | grep "service =" | while read line; do
              # Extract host and port from different possible formats
              if echo "$line" | grep -q "service ="; then
                # Format: service = priority weight port target
                port=$(echo "$line" | awk '{print $(NF-1)}')
                host=$(echo "$line" | awk '{print $NF}' | sed 's/\.$//')
                if [ ! -z "$host" ] && [ ! -z "$port" ]; then
                  echo "$host:$port"
                fi
              fi
            done)
            
            if [ ! -z "$ENDPOINTS" ]; then
              echo "Found endpoints:"
              echo "$ENDPOINTS"
              
              echo "Testing network connectivity to actual MongoDB endpoints..."
              echo "$ENDPOINTS" | while read endpoint; do
                if [ ! -z "$endpoint" ]; then
                  host=$(echo $endpoint | cut -d: -f1)
                  port=$(echo $endpoint | cut -d: -f2)
                  echo "Testing $host:$port..."
                  if command -v nc >/dev/null 2>&1; then
                    nc -zv $host $port 2>&1 || echo "Connection to $endpoint failed"
                  else
                    echo "netcat not available, skipping connectivity test"
                  fi
                fi
              done
            else
              echo "No valid endpoints extracted from SRV records"
            fi
          else
            echo "SRV record DNS resolution failed or no service records found"
          fi
          
          echo "TXT record lookup (for connection options):"
          nslookup -type=TXT testcluster.yzcupsf.mongodb.net || echo "TXT record DNS resolution failed"
          
          echo "Attempting MongoDB connection with detailed error info..."
          mongosh "mongodb+srv://twallace:3S3t9HuzaOmzFgCx@testcluster.yzcupsf.mongodb.net" \
            --quiet \
            --eval "
              console.log('✓ Connected to MongoDB Atlas!');
              console.log('Database list:');
              db.adminCommand('listDatabases').databases.forEach(db => console.log('- ' + db.name));
              console.log('Current database:', db.getName());
              console.log('MongoDB version:', db.version());
              console.log('✓ Connection test completed successfully!');
            " || {
              echo "❌ MongoDB connection failed"
              echo "Trying alternative connection methods..."
              
              # Try with explicit TLS settings
              mongosh "mongodb+srv://twallace:3S3t9HuzaOmzFgCx@testcluster.yzcupsf.mongodb.net" \
                --tls \
                --tlsAllowInvalidCertificates \
                --eval "console.log('Connected with relaxed TLS!')" || echo "TLS connection also failed"
            }
          
          echo "=== End Diagnostics ==="
          echo "Keeping container alive for debugging..."
          sleep 3600
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
