apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongosh
  namespace: httpbin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongosh
  template:
    metadata:
      labels:
        app: mongosh
      annotations:
        kuma.io/sidecar-injection: disabled
    spec:
      containers:
      - name: mongosh
        image: mongo:7.0
        imagePullPolicy: IfNotPresent
        command: ["mongosh"]
        args: 
        - "mongodb+srv://testcluster.yzcupsf.mongodb.net"
        - "--eval"
        - "console.log('Connected to MongoDB Atlas!'); db.adminCommand('ping'); console.log('Database:', db.getName());"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
