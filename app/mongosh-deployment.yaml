apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongosh
  namespace: httpbin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongosh
  template:
    metadata:
      labels:
        app: mongosh
        kuma.io/sidecar-injection: disabled
    spec:
      containers:
      - name: mongosh
        image: mongo:7.0
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash"]
        args: 
        - "-c"
        - |
          echo "MongoDB container ready for interactive testing"
          echo "To connect to Atlas, run:"
          echo "mongosh mongodb+srv://testcluster.yzcupsf.mongodb.net --username twallace"
          echo "or"
          echo "mongosh 'mongodb+srv://twallace:PASSWORD@testcluster.yzcupsf.mongodb.net'"
          echo ""
          echo "Container will stay alive indefinitely for exec access..."
          while true; do sleep 3600; done
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
