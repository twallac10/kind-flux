apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongosh
  namespace: httpbin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongosh
  template:
    metadata:
      labels:
        app: mongosh
    spec:
      containers:
      - name: mongosh
        image: alpine/mongosh:2.0.2
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh"]
        args: 
        - "-c"
        - |
          echo "=== MongoDB Atlas Connection Diagnostics ==="
          echo "Pod IP: $(hostname -i)"
          echo "Testing DNS resolution..."
          nslookup testcluster.yzcupsf.mongodb.net || echo "DNS resolution failed"
          
          echo "Testing network connectivity..."
          nc -zv testcluster.yzcupsf.mongodb.net 27017 || echo "Network connection failed"
          
          echo "Attempting MongoDB connection with detailed error info..."
          mongosh "mongodb+srv://twallace:3S3t9HuzaOmzFgCx@testcluster.yzcupsf.mongodb.net" \
            --quiet \
            --eval "
              console.log('✓ Connected to MongoDB Atlas!');
              console.log('Database list:');
              db.adminCommand('listDatabases').databases.forEach(db => console.log('- ' + db.name));
              console.log('Current database:', db.getName());
              console.log('MongoDB version:', db.version());
              console.log('✓ Connection test completed successfully!');
            " || {
              echo "❌ MongoDB connection failed"
              echo "Trying alternative connection methods..."
              
              # Try with explicit TLS settings
              mongosh "mongodb+srv://twallace:3S3t9HuzaOmzFgCx@testcluster.yzcupsf.mongodb.net" \
                --tls \
                --tlsAllowInvalidCertificates \
                --eval "console.log('Connected with relaxed TLS!')" || echo "TLS connection also failed"
            }
          
          echo "=== End Diagnostics ==="
          echo "Keeping container alive for debugging..."
          sleep 3600
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
