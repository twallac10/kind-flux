apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongosh
  namespace: httpbin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongosh
  template:
    metadata:
      labels:
        app: mongosh
    spec:
      containers:
      - name: mongosh
        image: mongo:7.0
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash"]
        args: 
        - "-c"
        - |
          echo "=== MongoDB Atlas Connection Test ==="
          echo "Container is ON the service mesh (testing mesh configuration)"
          echo ""
          
          echo "Testing MongoDB Atlas connection..."
          echo "Method 1: Standard connection with embedded credentials"
          mongosh "mongodb+srv://twallace:3S3t9HuzaOmzFgCx@testcluster.yzcupsf.mongodb.net" \
            --eval "
              console.log('✅ Connected to MongoDB Atlas!');
              console.log('Database:', db.getName());
              console.log('Server Info:', db.serverStatus().host);
              console.log('MongoDB Version:', db.version());
              console.log('Available databases:');
              db.adminCommand('listDatabases').databases.forEach(db => console.log('  -', db.name));
              console.log('✅ Connection test completed successfully!');
            " && echo "✅ MongoDB connection successful!" || {
              echo "❌ Standard connection failed, trying alternative methods..."
              
              echo "Method 2: Separate username/password"
              mongosh "mongodb+srv://testcluster.yzcupsf.mongodb.net" \
                --username twallace \
                --password 3S3t9HuzaOmzFgCx \
                --eval "console.log('✅ Connected with separate credentials!');" || echo "❌ Alternative method failed"
              
              echo "Method 3: Extended timeouts"
              mongosh "mongodb+srv://twallace:3S3t9HuzaOmzFgCx@testcluster.yzcupsf.mongodb.net/?connectTimeoutMS=30000&socketTimeoutMS=30000" \
                --eval "console.log('✅ Connected with extended timeouts!');" || echo "❌ Timeout method failed"
            }
          
          echo ""
          echo "=== Interactive Mode ==="
          echo "Container ready for kubectl exec access"
          echo "Commands to try:"
          echo "  kubectl exec -it deployment/mongosh -n httpbin -- bash"
          echo "  mongosh 'mongodb+srv://twallace:3S3t9HuzaOmzFgCx@testcluster.yzcupsf.mongodb.net'"
          echo ""
          echo "Container staying alive..."
          while true; do sleep 3600; done
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
