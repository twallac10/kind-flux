apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno-reports-meshpassthrough
  labels:
    app.kubernetes.io/name: kyverno
    app.kubernetes.io/component: reports-controller
rules:
- apiGroups:
  - kuma.io
  resources:
  - meshpassthroughs
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kyverno-reports-meshpassthrough
  labels:
    app.kubernetes.io/name: kyverno
    app.kubernetes.io/component: reports-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kyverno-reports-meshpassthrough
subjects:
- kind: ServiceAccount
  name: kyverno-reports-controller
  namespace: policy
