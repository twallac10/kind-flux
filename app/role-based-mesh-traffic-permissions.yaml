# Role-Based Kong Mesh Traffic Permissions
# This file contains specialized MeshTrafficPermissions for different roles and use cases

---
apiVersion: kuma.io/v1alpha1
kind: MeshTrafficPermission
metadata:
  name: allow-developer-development-to-github-api-external
  namespace: kuma-system
  labels:
    kuma.io/mesh: demo
spec:
  targetRef:
    kind: MeshSubset
    tags:
      kuma.io/service: github-api-external
  from:
  - targetRef:
      kind: MeshSubset
      tags:
        role: developer
        env: development
    default:
      action: Allow

