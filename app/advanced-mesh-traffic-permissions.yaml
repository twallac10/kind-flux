# Advanced Kong Mesh Traffic Permissions
# This file contains specialized MeshTrafficPermissions for specific scenarios

---
apiVersion: kuma.io/v1alpha1
kind: MeshTrafficPermission
metadata:
  name: allow-observability-to-all-external
  namespace: kuma-system
  labels:
    kuma.io/mesh: demo
spec:
  targetRef:
    kind: MeshSubset
    tags:
      kuma.io/service: "*-external"
  from:
  - targetRef:
      kind: MeshSubset
      tags:
        app.kubernetes.io/name: kube-state-metrics
    default:
      action: Allow
  - targetRef:
      kind: MeshSubset
      tags:
        app: prometheus
    default:
      action: Allow
  - targetRef:
      kind: MeshSubset
      tags:
        app: grafana
    default:
      action: Allow

