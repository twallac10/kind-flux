# Kong Mesh Traffic Permissions for External Services
# This file contains MeshTrafficPermissions to allow traffic to external services

---
apiVersion: kuma.io/v1alpha1
kind: MeshTrafficPermission
metadata:
  name: allow-httpbin-external
  namespace: kuma-system
  labels:
    kuma.io/mesh: demo
spec:
  targetRef:
    kind: MeshSubset
    tags:
      kuma.io/service: httpbin-external
  from:
  - targetRef:
      kind: MeshSubset
      tags:
        kuma.io/service: netshoot_httpbin_svc_80
    default:
      action: Allow
  - targetRef:
      kind: MeshSubset
      tags:
        kuma.io/service: httpbin_httpbin_svc_80
    default:
      action: Allow

